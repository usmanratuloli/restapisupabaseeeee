<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Mahasiswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans leading-normal tracking-normal">

    <!-- Header -->
    <nav class="bg-blue-600 p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center text-white">
            <h1 class="text-2xl font-bold"><i class="fas fa-user-graduate mr-2"></i>Data Mahasiswa</h1>
            <span class="text-sm opacity-80">Supabase REST API Interface</span>
        </div>
    </nav>

    <div class="container mx-auto p-6 flex flex-col md:flex-row gap-6">
        
        <!-- Form Section -->
        <div class="md:w-1/3">
            <div class="bg-white rounded-xl shadow-md p-6 border-t-4 border-blue-500">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Input Data Mahasiswa</h2>
                <form id="mahasiswaForm" class="space-y-4">
                    <input type="hidden" id="studentId">
                    <div>
                        <label class="block text-gray-600 text-sm font-medium mb-1">Nama Lengkap</label>
                        <input type="text" id="nama" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none transition" placeholder="Contoh: Budi Santoso">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-sm font-medium mb-1">NIM</label>
                        <input type="text" id="nim" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none transition" placeholder="Contoh: 12345678">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-sm font-medium mb-1">Jurusan</label>
                        <input type="text" id="jurusan" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none transition" placeholder="Contoh: Teknik Informatika">
                    </div>
                    <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg shadow transition duration-200">
                        <i class="fas fa-save mr-2"></i>Simpan Data
                    </button>
                    <button type="button" id="btnCancel" class="hidden w-full bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 rounded-lg shadow transition duration-200 mt-2">
                        Batal
                    </button>
                </form>
            </div>
        </div>

        <!-- Table Section -->
        <div class="md:w-2/3">
            <div class="bg-white rounded-xl shadow-md overflow-hidden">
                <div class="bg-gray-100 px-6 py-4 border-b flex justify-between items-center">
                    <h2 class="text-lg font-semibold text-gray-700">Daftar Mahasiswa</h2>
                    <button onclick="fetchData()" class="text-blue-600 hover:text-blue-800 transition">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600 uppercase text-xs font-bold">
                                <th class="px-6 py-3">Nama</th>
                                <th class="px-6 py-3">NIM</th>
                                <th class="px-6 py-3">Jurusan</th>
                                <th class="px-6 py-3 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="text-gray-700 text-sm">
                            <!-- Data akan muncul di sini -->
                        </tbody>
                    </table>
                </div>
                <div id="loading" class="text-center py-10 hidden">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500"></div>
                    <p class="mt-2 text-gray-500">Memuat data...</p>
                </div>
                <div id="emptyState" class="text-center py-10 text-gray-400">
                    <i class="fas fa-database fa-3x mb-3"></i>
                    <p>Tidak ada data mahasiswa</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/mahasiswa';
        const form = document.getElementById('mahasiswaForm');
        const tableBody = document.getElementById('tableBody');
        const loading = document.getElementById('loading');
        const emptyState = document.getElementById('emptyState');
        const btnSubmit = document.getElementById('btnSubmit');
        const btnCancel = document.getElementById('btnCancel');

        let isEditing = false;

        async function fetchData() {
            loading.classList.remove('hidden');
            tableBody.classList.add('hidden');
            emptyState.classList.add('hidden');

            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                tableBody.innerHTML = '';
                if (data && data.length > 0) {
                    data.forEach(mhs => {
                        const row = `
                            <tr class="border-b hover:bg-gray-50 transition">
                                <td class="px-6 py-4 font-medium">${mhs.nama}</td>
                                <td class="px-6 py-4">${mhs.nim}</td>
                                <td class="px-6 py-4">${mhs.jurusan}</td>
                                <td class="px-6 py-4 text-center">
                                    <button onclick="editMhs('${mhs.id}', '${mhs.nama}', '${mhs.nim}', '${mhs.jurusan}')" class="text-blue-500 hover:text-blue-700 mx-2">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button onclick="deleteMhs('${mhs.id}')" class="text-red-500 hover:text-red-700 mx-2">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        `;
                        tableBody.innerHTML += row;
                    });
                    tableBody.classList.remove('hidden');
                } else {
                    emptyState.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                alert('Gagal mengambil data. Pastikan server.py sudah jalan di localhost:8000');
            } finally {
                loading.classList.add('hidden');
            }
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('studentId').value;
            const payload = {
                nama: document.getElementById('nama').value,
                nim: document.getElementById('nim').value,
                jurusan: document.getElementById('jurusan').value
            };

            const method = isEditing ? 'PUT' : 'POST';
            const url = isEditing ? `${API_URL}/${id}` : API_URL;

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    resetForm();
                    fetchData();
                } else {
                    const errorData = await response.json();
                    alert('Gagal menyimpan data: ' + (errorData.detail || response.statusText));
                }
            } catch (error) {
                console.error('Error saving data:', error);
            }
        };

        function editMhs(id, nama, nim, jurusan) {
            isEditing = true;
            document.getElementById('studentId').value = id;
            document.getElementById('nama').value = nama;
            document.getElementById('nim').value = nim;
            document.getElementById('jurusan').value = jurusan;
            
            btnSubmit.innerHTML = '<i class="fas fa-save mr-2"></i>Update Data';
            btnSubmit.classList.replace('bg-blue-600', 'bg-orange-500');
            btnSubmit.classList.replace('hover:bg-blue-700', 'hover:bg-orange-600');
            btnCancel.classList.remove('hidden');
        }

        async function deleteMhs(id) {
            if (confirm('Yakin ingin menghapus data ini?')) {
                try {
                    const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    if (response.ok) fetchData();
                } catch (error) {
                    console.error('Error deleting data:', error);
                }
            }
        }

        function resetForm() {
            isEditing = false;
            form.reset();
            document.getElementById('studentId').value = '';
            btnSubmit.innerHTML = '<i class="fas fa-save mr-2"></i>Simpan Data';
            btnSubmit.classList.replace('bg-orange-500', 'bg-blue-600');
            btnSubmit.classList.replace('hover:bg-orange-600', 'hover:bg-blue-700');
            btnCancel.classList.add('hidden');
        }

        btnCancel.onclick = resetForm;
        window.onload = fetchData;
    </script>
</body>
</html>
